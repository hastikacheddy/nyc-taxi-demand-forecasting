global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Airflow metrics (statsd -> statsd-exporter -> Prometheus).
  - job_name: airflow
    static_configs:
      - targets: ['statsd-exporter:9102']

  # Serving API /metrics (only scraped when the serving container is running).
  - job_name: serving-api
    metrics_path: /metrics
    static_configs:
      - targets: ['demand-forecast-serving:8080']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

# Maps Airflow's dotted statsd metric names into clean Prometheus series.
mappings:
  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    labels:
      pool: "$1"
  - match: "airflow.pool.running_slots.*"
    name: "airflow_pool_running_slots"
    labels:
      pool: "$1"
  - match: "airflow.ti_successes"
    name: "airflow_task_successes_total"
  - match: "airflow.ti_failures"
    name: "airflow_task_failures_total"
  - match: "airflow.scheduler_heartbeat"
    name: "airflow_scheduler_heartbeat_total"
  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_success_seconds"
    labels:
      dag_id: "$1"
  # Everything else passes through with its dotted name flattened.
  - match: "."
    match_type: "regex"
    name: "${0}"

# LOCAL Airflow UI for inspecting the DAGs (development only — not production).
#
#   1. Start Docker Desktop and wait until it says "running".
#   2. docker compose -f docker-compose.airflow.yml up
#   3. Open http://localhost:8088
#      user: admin   password: printed in the logs (look for "Password for the
#      admin user" / standalone_admin_password.txt) on first start.
#
# The DAGs import the project's `src` package, so we mount it on PYTHONPATH and
# install the libraries the DAGs need at container start.
services:
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      # dags/, src/, data/, config.yaml all sit under /opt/airflow so the DAGs'
      # project_root assumption (parent of dags/) resolves correctly.
      PYTHONPATH: /opt/airflow
      # Separate sqlite registry inside the container (absolute path) so the
      # host's data/mlflow.db is left untouched; weekly training populates it.
      MLFLOW_TRACKING_URI: sqlite:////opt/airflow/data/mlflow_airflow.db
      RAW_CSV_PATH: /opt/airflow/data/yellow_tripdata.parquet
      # Emit metrics to the statsd-exporter (observability stack).
      AIRFLOW__METRICS__STATSD_ON: "True"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./src:/opt/airflow/src:ro
      - ./config.yaml:/opt/airflow/config.yaml:ro
      - ./data:/opt/airflow/data
    ports:
      - "8088:8080"
    command: standalone
